<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dezerv UI Reference Library</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2316c784'/><text x='50%25' y='56%25' dominant-baseline='middle' text-anchor='middle' font-family='system-ui' font-weight='700' font-size='18' fill='white'>D</text></svg>">

  <style>
    /* ── Password Gate ── */
    #passwordGate {
      position: fixed; inset: 0;
      background: #f5f6f7;
      display: none;
      align-items: center; justify-content: center;
      z-index: 9999;
    }
    .pg-card {
      background: #ffffff;
      border: 1px solid rgba(0,0,0,0.09);
      border-radius: 20px;
      padding: 40px 44px;
      width: 100%; max-width: 400px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.07);
    }
    .pg-logo {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 28px;
    }
    .pg-logo-mark {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #16c784 0%, #0ea56c 100%);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 17px; color: #fff;
    }
    .pg-logo-name {
      font-size: 18px; font-weight: 650; color: #111; letter-spacing: -0.2px;
    }
    .pg-title {
      font-size: 20px; font-weight: 700; color: #111;
      letter-spacing: -0.3px; margin-bottom: 6px;
    }
    .pg-subtitle {
      font-size: 14px; color: #888; margin-bottom: 26px; line-height: 1.5;
    }
    .pg-input {
      width: 100%; height: 44px; padding: 0 14px;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 10px;
      font-size: 15px; font-family: inherit;
      outline: none; background: #fff; color: #111;
      transition: border-color 0.15s, box-shadow 0.15s;
      margin-bottom: 10px;
    }
    .pg-input:focus {
      border-color: #16c784;
      box-shadow: 0 0 0 3px rgba(22,199,132,0.15);
    }
    .pg-error {
      display: none;
      font-size: 13px; color: #dc2626;
      margin-bottom: 10px;
      text-align: left; padding-left: 2px;
    }
    .pg-btn {
      width: 100%; height: 44px;
      background: #111; color: #fff;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600; font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .pg-btn:hover  { background: #2a2a2a; }
    .pg-btn:active { transform: scale(0.98); }
    .pg-btn:disabled { opacity: 0.55; cursor: default; transform: none; }
  </style>

</head>
<body>

  <!-- ══════════════════════════════════════
       PASSWORD GATE
  ══════════════════════════════════════ -->
  <div id="passwordGate">
    <div class="pg-card">
      <div class="pg-logo">
        <div class="pg-logo-mark">D</div>
        <span class="pg-logo-name">Dezerv</span>
      </div>
      <p class="pg-title">UI Reference Library</p>
      <p class="pg-subtitle">Enter your access key to continue</p>
      <form id="passwordForm" autocomplete="off">
        <input
          type="password"
          id="passwordInput"
          class="pg-input"
          placeholder="Enter password"
          autofocus
          spellcheck="false"
        >
        <p class="pg-error" id="passwordError">Incorrect password. Please try again.</p>
        <button type="submit" class="pg-btn" id="passwordSubmit">Access Library</button>
      </form>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       APP CONTENT  (hidden until unlocked)
  ══════════════════════════════════════ -->
  <div id="appContent" style="display:none">

  <!-- ══════════════════════════════════════
       HEADER
  ══════════════════════════════════════ -->
  <header class="header">

    <a class="header-logo" href="#" onclick="return false">
      <div class="header-logo-mark">D</div>
      <span class="header-logo-name">Dezerv</span>
    </a>

    <div class="header-search-trigger" id="searchBar"
         role="button" tabindex="0"
         aria-label="Search for patterns" aria-haspopup="dialog">
      <!-- Search icon -->
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span class="header-search-placeholder">Search for patterns</span>
    </div>

    <div class="header-right">
      <div class="user-avatar" title="Yatish Asthana">Y</div>
    </div>

  </header>


  <!-- ══════════════════════════════════════
       MAIN LAYOUT
  ══════════════════════════════════════ -->
  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar" role="navigation" aria-label="Categories">

      <button class="sidebar-all active" id="sidebarAll">
        <span>All</span>
        <span class="count-badge" id="sidebarAllCount">0</span>
      </button>

      <div class="sidebar-divider"></div>

      <div class="sidebar-section">
        <span class="sidebar-section-label">UI Components</span>
        <ul id="uiComponentsList"></ul>
      </div>

      <div class="sidebar-divider"></div>

      <div class="sidebar-section">
        <span class="sidebar-section-label">Screens</span>
        <ul id="screenCategoriesList"></ul>
      </div>

    </aside>

    <!-- Main content -->
    <main class="main-content" role="main">

      <div class="results-bar">
        <span class="results-category-label" id="resultsLabel">All Screens</span>
        <span class="results-count" id="resultsCount"></span>
      </div>

      <div class="screen-grid" id="screenGrid" role="list"></div>

    </main>

  </div><!-- /layout -->


  <!-- ══════════════════════════════════════
       SEARCH OVERLAY  —  two-column dark modal
  ══════════════════════════════════════ -->
  <div class="search-overlay" id="searchOverlay"
       role="dialog" aria-modal="true" aria-label="Search">

    <div class="search-modal">

      <!-- Search input row -->
      <div class="search-modal-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" class="search-input"
               placeholder="Search for patterns..."
               autocomplete="off" spellcheck="false" aria-label="Search categories">
        <button class="search-modal-close" id="searchModalClose" aria-label="Close search">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- Two-column body -->
      <div class="search-modal-body">

        <!-- ── Left: category type navigation ── -->
        <div class="search-nav">
          <div class="search-nav-section-label">Browse</div>

          <div class="search-nav-item active" id="searchTabUi" data-tab="ui" role="button" tabindex="0">
            <div class="search-nav-item-icon ui-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
              </svg>
            </div>
            <span class="search-nav-item-label">UI Components</span>
            <span class="search-nav-item-count" id="searchNavUiCount"></span>
          </div>

          <div class="search-nav-item" id="searchTabScreens" data-tab="screens" role="button" tabindex="0">
            <div class="search-nav-item-icon screen-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
                <line x1="12" y1="18" x2="12.01" y2="18"/>
              </svg>
            </div>
            <span class="search-nav-item-label">Screens</span>
            <span class="search-nav-item-count" id="searchNavScreensCount"></span>
          </div>
        </div>

        <!-- ── Right: subcategory list ── -->
        <div class="search-results">

          <!-- Recent tags (shown at top when no query) -->
          <div class="search-recent" id="recentSection" style="display:none">
            <div class="search-recent-label">Recent</div>
            <div class="recent-tags" id="recentTagsWrap"></div>
          </div>

          <!-- No results -->
          <div class="search-no-results" id="searchNoResults" style="display:none">
            No categories found
          </div>

          <!-- Category rows (JS populated) -->
          <div id="searchCatList"></div>

        </div>

      </div><!-- /search-modal-body -->

    </div><!-- /search-modal -->

  </div><!-- /search-overlay -->


  <!-- ══════════════════════════════════════
       DETAIL OVERLAY  —  Floating modal with dark backdrop
  ══════════════════════════════════════ -->
  <div class="detail-overlay" id="detailOverlay"
       role="dialog" aria-modal="true" aria-label="Screen preview">

    <!-- White floating card -->
    <div class="detail-modal-card">

      <!-- ── Header: title + close ── -->
      <div class="detail-header">
        <span class="detail-title" id="detailTitle"></span>
        <button class="detail-close" id="detailClose" aria-label="Close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- ── Body: phone image + nav arrows inside at edges ── -->
      <div class="detail-body" id="detailBody">

        <!-- Left arrow — inside body, absolute left edge -->
        <button class="detail-nav prev" id="detailPrev" aria-label="Previous screen">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>

        <img class="detail-image" id="detailImage" alt="" loading="eager">

        <!-- Right arrow — inside body, absolute right edge -->
        <button class="detail-nav next" id="detailNext" aria-label="Next screen">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>

      </div>

      <!-- ── Footer: project tag + Save / Copy ── -->
      <div class="detail-footer">
        <div class="detail-meta">
          <span class="found-in-label">Found in</span>
          <span class="project-tag" title="Goal Planning (link coming soon)">Goal Planning</span>
        </div>
        <div class="detail-actions">
          <button class="btn-save" id="btnSave">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Save
          </button>
          <button class="btn-copy" id="btnCopy">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            <span id="btnCopyLabel">Copy</span>
          </button>
        </div>
      </div>

    </div><!-- /detail-modal-card -->

  </div><!-- /detail-overlay -->


  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  </div><!-- /#appContent -->

  <script src="app.js"></script>
</body>
</html>
